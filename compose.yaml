services:
  mysql:
    image: mysql:8.0
    container_name: e_commerce_db-mysql
    environment:
      MYSQL_DATABASE: e_commerce_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3067:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:

